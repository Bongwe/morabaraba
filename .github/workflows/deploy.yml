name: Deploy to DigitalOcean

on:
  push:
    branches:
      - checkers-game

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalise image prefix to lowercase
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./morabaraba-frontend
          file: ./morabaraba-frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          timeout: 30s
          script: |
            echo "✅ SSH connection successful!"
            echo "Connected to: $(hostname)"
            echo "Server IP: $(curl -s ifconfig.me)"
            echo "Uptime: $(uptime)"

      - name: Copy docker-compose to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "docker-compose.yml"
          target: "/opt/morabaraba"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/morabaraba
            IMAGE_PREFIX=${{ env.IMAGE_PREFIX }} docker compose pull
            IMAGE_PREFIX=${{ env.IMAGE_PREFIX }} docker compose up -d --remove-orphans